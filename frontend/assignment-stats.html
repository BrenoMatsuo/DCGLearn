<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống kê bài tập - DCGLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #F8FAFC; }
        
        /* Dashboard Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .icon-blue { background: #E3F2FD; color: #1976D2; }
        .icon-green { background: #E8F5E9; color: #388E3C; }
        .icon-orange { background: #FFF3E0; color: #F57C00; }

        /* Table Style */
        .table-container {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            text-align: left;
            padding: 15px;
            background: #F8FAFC;
            color: var(--text-gray);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #F1F5F9;
            font-size: 15px;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-done { background: #E8F5E9; color: #2E7D32; }
        .status-pending { background: #FFF3E0; color: #EF6C00; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #EDF2F7;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-blue);
        }
    </style>
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>DCG<span>Learn</span></span>
            </div>
            <nav class="main-nav">
                <a href="/dashboard-teacher">Bảng điều khiển</a>
                <a href="#" class="active">Thống kê chi tiết</a>
            </nav>
            <div class="user-control">
                <span id="navUserName">Giảng viên</span>
                <button class="logout-icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <div class="page-header" style="margin-bottom: 25px;">
            <h2 id="asmTitleDisplay" style="font-weight: 800; font-size: 28px;">Đang tải tiêu đề bài tập...</h2>
            <p id="asmCourseDisplay" style="color: var(--text-gray);">Khóa học: ...</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon icon-blue"><i class="fas fa-users"></i></div>
                <div>
                    <p style="color: var(--text-gray); font-size: 14px;">Tổng học viên</p>
                    <h3 id="totalStudents" style="font-size: 22px;">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-green"><i class="fas fa-check-circle"></i></div>
                <div>
                    <p style="color: var(--text-gray); font-size: 14px;">Đã hoàn thành</p>
                    <h3 id="completedCount" style="font-size: 22px;">0</h3>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-orange"><i class="fas fa-clock"></i></div>
                <div>
                    <p style="color: var(--text-gray); font-size: 14px;">Tỉ lệ hoàn thành</p>
                    <h3 id="completionRate" style="font-size: 22px;">0%</h3>
                </div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="font-weight: 700;">Danh sách nộp bài</h3>
            <table>
                <thead>
                    <tr>
                        <th>Học viên</th>
                        <th>Thời gian nộp</th>
                        <th>Trạng thái</th>
                        <th>Điểm số</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="studentList">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Giả sử ta lấy assignmentId từ URL: ?id=123
            const urlParams = new URLSearchParams(window.location.search);
            const assignmentId = urlParams.get('id');
            const token = localStorage.getItem('token');

            async function loadStats() {
                try {
                    // 1. Gọi API lấy thông tin bài tập và danh sách nộp bài
                    // const response = await fetch(`/api/assignments/${assignmentId}/stats`, { ... });
                    // const data = await response.json();

                    // Dữ liệu giả lập để minh họa:
                    const data = {
                        title: "Bài tập về nhà Chương 1 - Đạo hàm",
                        course: "Toán học lớp 12",
                        stats: { total: 40, completed: 28 },
                        submissions: [
                            { name: "Nguyễn Văn A", time: "10:20 05/04/2026", status: "Hoàn thành", score: 9.5 },
                            { name: "Trần Thị B", time: "08:15 06/04/2026", status: "Hoàn thành", score: 8.0 },
                            { name: "Lê Văn C", time: "--", status: "Chưa nộp", score: "--" }
                        ]
                    };

                    // 2. Hiển thị thông tin chung
                    document.getElementById('asmTitleDisplay').textContent = data.title;
                    document.getElementById('asmCourseDisplay').textContent = `Khóa học: ${data.course}`;
                    document.getElementById('totalStudents').textContent = data.stats.total;
                    document.getElementById('completedCount').textContent = data.stats.completed;
                    
                    const rate = Math.round((data.stats.completed / data.stats.total) * 100);
                    document.getElementById('completionRate').textContent = rate + "%";

                    // 3. Render danh sách học viên
                    const listBody = document.getElementById('studentList');
                    listBody.innerHTML = data.submissions.map(s => `
                        <tr>
                            <td><strong>${s.name}</strong></td>
                            <td>${s.time}</td>
                            <td>
                                <span class="status-badge ${s.status === 'Hoàn thành' ? 'status-done' : 'status-pending'}">
                                    ${s.status}
                                </span>
                            </td>
                            <td>${s.score}</td>
                            <td><button class="btn-outline" style="padding: 5px 12px; font-size: 12px;">Xem bài</button></td>
                        </tr>
                    `).join('');

                } catch (error) {
                    console.error("Lỗi:", error);
                }
            }

            loadStats();
        });
    </script>
</body>
</html>
