<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Tạo khóa học mới - DCGLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #F8FAFC; }
        .editor-container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .form-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        .input-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        label { font-weight: 600; color: var(--text-dark); font-size: 14px; }
        input, select, textarea {
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .image-upload-box {
            border: 2px dashed #E2E8F0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #F8FAFC;
        }
        .image-upload-box:hover { border-color: var(--primary-blue); background: #F1F5F9; }
        #imgPreview {
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        /* CSS để chia đôi dòng Mã Code và Khối lớp */
        .form-row-half {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo" onclick="window.location.href='dashboard-teacher.html'" style="cursor:pointer">
                <i class="fas fa-graduation-cap"></i>
                <span>DCG<span>Learn</span></span>
            </div>
            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="manage-courses.html">Quản lý khóa học</a>
                <a href="dashboard-teacher.html">Bảng tin</a>
                <span style="color: #cbd5e1;">|</span>
                <span id="navUserName" style="font-weight: 600; color: var(--primary-blue);">Giảng viên</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="editor-container">
            <h2 id="mainHeading" style="font-weight: 800; font-size: 28px; margin-bottom: 10px;">Tạo khóa học mới</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Điền đầy đủ thông tin bên dưới để xuất bản khóa học của bạn.</p>

            <form id="courseForm">
                <div class="form-layout">
                    <div class="form-main">
                        <div class="input-group-vertical">
                            <label>Tên khóa học *</label>
                            <input type="text" id="courseName" placeholder="Ví dụ: Toán học giải tích 12" required>
                        </div>

                        <div class="input-group-vertical">
                            <label>Mô tả ngắn gọn *</label>
                            <textarea id="courseDesc" rows="6" placeholder="Tóm tắt nội dung khóa học..." required></textarea>
                            <div style="text-align: right; font-size: 12px; color: #94a3b8;">
                                <span id="charCount">0</span>/500 ký tự
                            </div>
                        </div>



                        <div style="margin-top: 40px;">
                            <button type="submit" class="btn-primary" id="submitBtn" style="width: 100%; padding: 15px; font-size: 16px;">
                                Hoàn tất & Xuất bản
                            </button>
                            <button type="button" class="btn-outline" onclick="history.back()" style="width: 100%; margin-top: 10px; border: none;">
                                Hủy bỏ
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');
        if (!user || !token) { window.location.href = 'index.html'; return; }

        document.getElementById('navUserName').textContent = user.name || "Giảng viên";

        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');

        // --- PHẦN 1: FETCH DỮ LIỆU CŨ KHI EDIT ---
        if (editId) {
            document.getElementById('pageTitle').innerText = "Chỉnh sửa khóa học - DCGLearn";
            document.getElementById('mainHeading').innerText = "Chỉnh sửa khóa học";
            document.getElementById('submitBtn').innerText = "Lưu thay đổi";

            fetch(`/api/courses/${editId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
                .then(res => {
                    if (!res.ok) throw new Error("Không tìm thấy khóa học");
                    return res.json();
                })
                .then(data => {
                    document.getElementById('courseName').value = data.title || "";
                    document.getElementById('courseDesc').value = data.description || "";
                    document.getElementById('charCount').innerText = (data.description || "").length;
                })
                .catch(err => {
                    alert("Lỗi: " + err.message);
                    window.location.href = 'manage-courses.html';
                });
        }

        // --- PHẦN 2: ĐẾM KÝ TỰ ---
        document.getElementById('courseDesc').addEventListener('input', function() {
            document.getElementById('charCount').innerText = this.value.length;
        });

        // --- PHẦN 3: SUBMIT ---
        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');

            const courseData = {
                title: document.getElementById('courseName').value.trim(),
                description: document.getElementById('courseDesc').value.trim()
            };

            if (!courseData.title) { alert("Vui lòng nhập tên khóa học."); return; }
            if (!courseData.description) { alert("Vui lòng nhập mô tả khóa học."); return; }

            try {
                btn.disabled = true;
                btn.innerText = "Đang xử lý...";

                const method = editId ? 'PUT' : 'POST';
                const endpoint = editId ? `/api/courses/${editId}` : '/api/courses';

                const response = await fetch(endpoint, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(courseData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(editId ? "Cập nhật thành công!" : "Tạo khóa học thành công!");
                    window.location.href = 'manage-courses.html';
                } else {
                    alert("Lỗi: " + (result.message || "Không thể thực hiện."));
                }
            } catch (error) {
                console.error(error);
                alert("Lỗi kết nối Server.");
            } finally {
                btn.disabled = false;
                btn.innerText = editId ? "Lưu thay đổi" : "Hoàn tất & Xuất bản";
            }
        });
    });
</script>
</body>
</html>
