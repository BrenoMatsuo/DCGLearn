<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Tạo khóa học mới - DCGLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { background-color: #F8FAFC; }
        .editor-container {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-top: 30px;
            margin-bottom: 50px;
        }
        .form-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }
        .input-group-vertical {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        label { font-weight: 600; color: var(--text-dark); font-size: 14px; }
        input, select, textarea {
            padding: 12px 16px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .image-upload-box {
            border: 2px dashed #E2E8F0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #F8FAFC;
        }
        .image-upload-box:hover { border-color: var(--primary-blue); background: #F1F5F9; }
        #imgPreview {
            width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        /* CSS để chia đôi dòng Mã Code và Khối lớp */
        .form-row-half {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo" onclick="window.location.href='dashboard-teacher.html'" style="cursor:pointer">
                <i class="fas fa-graduation-cap"></i>
                <span>DCG<span>Learn</span></span>
            </div>
            <nav style="display: flex; align-items: center; gap: 25px;">
                <a href="manage-courses.html">Quản lý khóa học</a>
                <a href="dashboard-teacher.html">Bảng tin</a>
                <span style="color: #cbd5e1;">|</span>
                <span id="navUserName" style="font-weight: 600; color: var(--primary-blue);">Giảng viên</span>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="editor-container">
            <h2 id="mainHeading" style="font-weight: 800; font-size: 28px; margin-bottom: 10px;">Tạo khóa học mới</h2>
            <p style="color: #64748b; margin-bottom: 30px;">Điền đầy đủ thông tin bên dưới để xuất bản khóa học của bạn.</p>

            <form id="courseForm">
                <div class="form-layout">
                    <div class="form-main">
                        <div class="input-group-vertical">
                            <label>Tên khóa học *</label>
                            <input type="text" id="courseName" placeholder="Ví dụ: Toán học giải tích 12" required>
                        </div>

                        <div class="input-group-vertical">
                            <label>Mô tả ngắn gọn *</label>
                            <textarea id="courseDesc" rows="6" placeholder="Tóm tắt nội dung khóa học..." required></textarea>
                            <div style="text-align: right; font-size: 12px; color: #94a3b8;">
                                <span id="charCount">0</span>/500 ký tự
                            </div>
                        </div>

                        <div class="form-row-half">
                            <div class="input-group-vertical">
                                <label>Môn học *</label>
                                <select id="courseCategory" required>
                                    <option value="" disabled selected>Chọn môn học</option>
                                    <option value="Toán học">Toán học</option>
                                    <option value="Vật lý">Vật lý</option>
                                    <option value="Hóa học">Hóa học</option>
                                    <option value="Tiếng Anh">Tiếng Anh</option>
                                    <option value="Ngữ văn">Ngữ văn</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                            <div class="input-group-vertical">
                                <label>Khối lớp *</label>
                                <select id="courseGrade" required>
                                    <option value="10">Lớp 10</option>
                                    <option value="11">Lớp 11</option>
                                    <option value="12">Lớp 12</option>
                                    <option value="Chung">Chung</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group-vertical" style="width: 50%; padding-right: 10px;">
                            <label>Mã định danh (Code)</label>
                            <input type="text" id="courseCode" placeholder="MATH12-01">
                        </div>
                    </div>

                    <div class="form-sidebar">
                        <div class="input-group-vertical">
                            <label>Hình ảnh khóa học</label>
                            <div class="image-upload-box" onclick="document.getElementById('courseImage').click()">
                                <i class="fas fa-cloud-upload-alt" style="font-size: 30px; color: #94a3b8;"></i>
                                <p style="font-size: 13px; margin-top: 10px; color: #64748b;">Click để tải ảnh lên (JPG, PNG)</p>
                                <input type="file" id="courseImage" hidden accept="image/*">
                                <img id="imgPreview" src="" alt="Preview">
                            </div>
                        </div>

                        <div style="margin-top: 40px;">
                            <button type="submit" class="btn-primary" id="submitBtn" style="width: 100%; padding: 15px; font-size: 16px;">
                                Hoàn tất & Xuất bản
                            </button>
                            <button type="button" class="btn-outline" onclick="history.back()" style="width: 100%; margin-top: 10px; border: none;">
                                Hủy bỏ
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');
            if (!user || !token) { window.location.href = 'index.html'; return; }

            // Hiển thị tên
            document.getElementById('navUserName').textContent = user.name || "Giảng viên";

            // Lấy ID từ URL nếu đang ở chế độ EDIT
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            let currentImageBase64 = "";

            // --- PHẦN 1: LOGIC FETCH DỮ LIỆU CŨ KHI EDIT ---
            if (editId) {
                document.getElementById('pageTitle').innerText = "Chỉnh sửa khóa học - DCGLearn";
                document.getElementById('mainHeading').innerText = "Chỉnh sửa khóa học";
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.innerText = "Lưu thay đổi";

                fetch(`/api/courses/${editId}`)
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('courseName').value = data.title || "";
                        document.getElementById('courseCode').value = data.code || "";
                        
                        // KHÔI PHỤC LOGIC: Đổ dữ liệu môn học cũ vào
                        document.getElementById('courseCategory').value = data.category || "";
                        
                        document.getElementById('courseGrade').value = data.grade || "12";
                        document.getElementById('courseDesc').value = data.description || "";
                        document.getElementById('charCount').innerText = (data.description || "").length;
                        
                        if (data.image) {
                            const preview = document.getElementById('imgPreview');
                            preview.src = data.image;
                            preview.style.display = 'block';
                            currentImageBase64 = data.image; // Giữ lại ảnh cũ nếu không thay đổi
                        }
                    })
                    .catch(err => console.error("Lỗi lấy thông tin khóa học:", err));
            }

            // --- PHẦN 2: XỬ LÝ ẢNH (GIỮ NGUYÊN) ---
            document.getElementById('courseImage').addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        currentImageBase64 = e.target.result;
                        const preview = document.getElementById('imgPreview');
                        preview.src = currentImageBase64;
                        preview.style.display = 'block';
                    }
                    reader.readAsDataURL(file);
                }
            });

            // Đếm ký tự
            document.getElementById('courseDesc').addEventListener('input', function() {
                document.getElementById('charCount').innerText = this.value.length;
            });

            // --- PHẦN 3: SUBMIT (GỬI KÈM MÔN HỌC) ---
            document.getElementById('courseForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitBtn');
                
                const courseData = {
                    title: document.getElementById('courseName').value,
                    code: document.getElementById('courseCode').value,
                    
                    // KHÔI PHỤC LOGIC: Gửi dữ liệu môn học lên server
                    category: document.getElementById('courseCategory').value,
                    
                    grade: document.getElementById('courseGrade').value,
                    description: document.getElementById('courseDesc').value,
                    image: currentImageBase64,
                    instructor: user.name // Đảm bảo instructor khớp
                };

                try {
                    btn.disabled = true;
                    btn.innerText = "Đang xử lý...";

                    const method = editId ? 'PUT' : 'POST';
                    const endpoint = editId ? `/api/courses/${editId}` : '/api/courses';

                    const response = await fetch(endpoint, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(courseData)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        alert(editId ? "Cập nhật thành công!" : "Tạo khóa học thành công!");
                        window.location.href = 'manage-courses.html';
                    } else {
                        alert("Lỗi: " + (result.message || "Không thể thực hiện."));
                    }
                } catch (error) {
                    console.error(error);
                    alert("Lỗi kết nối Server.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = editId ? "Lưu thay đổi" : "Hoàn tất & Xuất bản";
                }
            });
        });
    </script>
</body>
</html>
