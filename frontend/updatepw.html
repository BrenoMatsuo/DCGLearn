<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật người dùng - DCGLearn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .update-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .form-section:last-child {
            border-bottom: none;
        }
        .form-section h3 {
            margin-bottom: 15px;
            font-size: 18px;
            color: var(--primary-blue);
        }
    </style>
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo" onclick="window.location.href='dashboard-admin.html'" style="cursor: pointer;">
                <i class="fas fa-graduation-cap"></i>
                <span>DCG<span>Learn</span></span>
            </div>
            <nav>
                <a href="dashboard-admin.html">Quản trị</a>
                <div class="user-profile">
                    <div class="user-dropdown">
                        <button class="user-dropbtn" id="userMenuBtn">
                            <i class="far fa-user-circle"></i>
                            <span id="navUserName">Admin</span>
                            <i class="fas fa-chevron-down" style="font-size: 12px; margin-left: 5px;"></i>
                        </button>
                        <div class="dropdown-content" id="userDropdown">
                            <a href="viewprofile.html"><i class="fas fa-user"></i> Hồ sơ của tôi</a>
                            <a href="#" id="logoutBtn" style="color: #ff4d4f;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="update-container">
            <h2 class="section-title">Cập nhật người dùng #<span id="targetUserId">...</span></h2>
            
            <!-- Section Cập nhật Vai trò -->
            <div class="form-section">
                <h3>Thay đổi vai trò</h3>
                <div class="input-group-vertical">
                    <label for="roleSelect">Chọn vai trò mới</label>
                    <select id="roleSelect">
                        <option value="Học viên">Học viên</option>
                        <option value="Giảng viên">Giảng viên</option>
                        <option value="Admin">Admin</option>
                    </select>
                    <button class="btn-primary" id="updateRoleBtn" style="margin-top: 10px;">Cập nhật vai trò</button>
                </div>
            </div>

            <!-- Section Đặt lại mật khẩu -->
            <div class="form-section">
                <h3>Đặt lại mật khẩu</h3>
                <div class="input-group-vertical">
                    <label for="newPassword">Mật khẩu mới</label>
                    <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới">
                    <button class="btn-primary" id="resetPwBtn" style="margin-top: 10px; background: #607D8B;">Đặt lại mật khẩu</button>
                </div>
            </div>

            <button class="btn-outline" onclick="window.location.href='dashboard-admin.html'" style="width: 100%;">
                <i class="fas fa-arrow-left"></i> Quay lại danh sách
            </button>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('id');
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!userId) {
                alert('Không tìm thấy ID người dùng.');
                window.location.href = 'dashboard-admin.html';
                return;
            }

            if (!token || user.role !== 'Admin') {
                alert('Bạn không có quyền truy cập trang này.');
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('navUserName').textContent = user.name;
            document.getElementById('targetUserId').textContent = userId;

            // Xử lý cập nhật vai trò
            document.getElementById('updateRoleBtn').addEventListener('click', async () => {
                const role = document.getElementById('roleSelect').value;
                // Ánh xạ tên vai trò sang tên chuẩn trong database (Học viên -> Student, Giảng viên -> Teacher)
                let dbRole = role;
                if (role === 'Học viên') dbRole = 'Student';
                if (role === 'Giảng viên') dbRole = 'Teacher';

                try {
                    const response = await fetch(`/api/user/role/${userId}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ role: dbRole })
                    });
                    const data = await response.json();
                    alert(data.message);
                } catch (error) {
                    console.error('Lỗi cập nhật vai trò:', error);
                }
            });

            // Xử lý đặt lại mật khẩu
            document.getElementById('resetPwBtn').addEventListener('click', async () => {
                const newPassword = document.getElementById('newPassword').value;
                if (!newPassword) return alert('Vui lòng nhập mật khẩu mới.');

                try {
                    const response = await fetch(`/api/user/reset-password/${userId}`, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ newPassword })
                    });
                    const data = await response.json();
                    alert(data.message);
                    if (response.ok) {
                        document.getElementById('newPassword').value = '';
                    }
                } catch (error) {
                    console.error('Lỗi đặt lại mật khẩu:', error);
                }
            });

            // Dropdown logic
            const userMenuBtn = document.getElementById('userMenuBtn');
            const userDropdown = document.getElementById('userDropdown');
            if (userMenuBtn) {
                userMenuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userDropdown.classList.toggle('show');
                });
            }
            window.addEventListener('click', () => {
                if (userDropdown && userDropdown.classList.contains('show')) {
                    userDropdown.classList.remove('show');
                }
            });

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.href = 'index.html';
                });
            }
        });
    </script>
</body>
</html>
